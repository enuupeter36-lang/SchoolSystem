<!DOCTYPE html>
<html>
<head>
<title>Print All ID Cards</title>
<style>
body { font-family: Arial; background: #f4f4f4; padding: 20px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(90mm, 1fr)); gap: 20px; }
.card { border: 2px solid #667eea; padding: 10px; border-radius: 10px; background: white; text-align: center; page-break-inside: avoid; }
.logo { width: 40px; margin-bottom: 5px; }
.photo { width: 25mm; height: 30mm; object-fit: cover; border: 2px solid #667eea; margin-bottom: 5px; }
.qr { width: 20mm; margin-top: 5px; }
.barcode { width: 40mm; margin-top: 5px; }
.top { font-weight: bold; margin-bottom: 5px; }
.btn { padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 6px; cursor: pointer; margin:5px;}
@media print { .btn { display: none; } }
</style>
</head>
<body>

<h2 style="text-align:center;">All Students</h2>

<div style="text-align:center; margin-bottom:20px;">
  <button onclick="window.print()">🖨 Print All ID Cards</button>
  <a href="/students" class="btn">← Back</a>
</div>

<div class="grid">
{% for s in students %}
  <div class="card">
    <img src="{{ url_for('static', filename='logo.png') }}" class="logo">
    <div class="top">LOLACHAT SEED S.S</div>
    <img src="{{ url_for('static', filename='student_photos/' + (s.photo or 'default.png')) }}" class="photo">
    <div><b>{{ s.first_name }} {{ s.last_name }}</b></div>
    <div>Adm: {{ s.admission }}</div>
    <div>{{ s.class }} {{ s.stream or '' }}</div>
    <img src="{{ url_for('static', filename='barcodes/' + s.admission + '.png') }}" class="barcode">
    <img src="{{ url_for('static', filename='qrcodes/' + s.admission + '.png') }}" class="qr">
  </div>
{% endfor %}
</div>

</body>
</html>
