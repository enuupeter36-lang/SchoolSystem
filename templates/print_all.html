<!DOCTYPE html>
<html>
<head>
<title>Print All ID Cards</title>
<style>
  body { font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:#f4f4f4; padding:20px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:20px; }
  .card { border:2px solid #667eea; padding:10px; border-radius:10px; background:white; text-align:center; page-break-inside:avoid; }
  .logo { width:40px; margin-bottom:5px; }
  .photo { width:80px; height:100px; object-fit:cover; border:2px solid #667eea; }
  .barcode { width:130px; margin-top:5px; }
  .qr { width:60px; margin-top:5px; }
  .school-name { font-weight:bold; margin-bottom:5px; }
  .btn { padding:10px 20px; background:#667eea; color:white; border:none; border-radius:6px; cursor:pointer; margin-bottom:15px; display:inline-block; }
  .btn:hover { box-shadow:0 8px 20px rgba(0,0,0,0.3); }
  @media print { .btn { display:none; } }
</style>
</head>
<body>
<h2 style="text-align:center;">{% if selected_class %}Class {{ selected_class }}{% else %}All Students{% endif %}</h2>
<div style="text-align:center; margin-bottom:20px;">
  <button onclick="window.print()" class="btn">🖨 Print All ID Cards</button>
  <a href="/batch-print" class="btn">← Back</a>
</div>
<div class="grid">
  {% for s in students %}
  <div class="card">
    <img src="{{ url_for('static', filename='logo.png') }}" class="logo">
    <div class="school-name">LOLACHAT SEED S.S</div>
    <img src="{{ url_for('static', filename='student_photos/' + (s.photo or 'default.png')) }}" class="photo">
    <div><b>{{ s.first_name }} {{ s.last_name }}</b></div>
    <div>Adm: {{ s.admission }}</div>
    <div>{{ s.class }} {{ s.stream or '' }}</div>
    <img src="{{ url_for('static', filename='barcodes/' + s.admission + '.png') }}" class="barcode">
    <img src="{{ url_for('static', filename='qrcodes/' + s.admission + '.png') }}" class="qr">
  </div>
  {% endfor %}
</div>
</body>
</html>
