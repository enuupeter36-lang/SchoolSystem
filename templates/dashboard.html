<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
  background: white;
  padding: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 20px;
}

th, td {
  border: 1px solid #ddd;
  padding: 10px;
  text-align: center;
}

button {
  padding: 10px;
  background: #667eea;
  color: white;
  border: none;
  margin: 5px;
}
</style>

</head>

<body>

<div class="container">

<h1>📊 Dashboard</h1>

<h3>Total Students: {{ total_students }}</h3>

<a href="/export/excel"><button>Export Excel</button></a>
<a href="/export/pdf"><button>Export PDF</button></a>
<a href="/batch-print"><button>Print ID Cards</button></a>

<h2>Students per Class</h2>
<table>
<tr><th>Class</th><th>Count</th></tr>

{% for row in class_data %}
<tr>
<td>{{ row.class }}</td>
<td>{{ row.count }}</td>
</tr>
{% endfor %}
</table>

<h2>Gender Distribution</h2>
<table>
<tr><th>Gender</th><th>Count</th></tr>

{% for row in gender_data %}
<tr>
<td>{{ row.gender }}</td>
<td>{{ row.count }}</td>
</tr>
{% endfor %}
</table>

<a href="/">← Back Home</a>

</div>

</body>
</html>
