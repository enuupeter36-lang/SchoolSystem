<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>
<body>

<h1>School Dashboard</h1>

<h3>Total Students: {{ total_students }}</h3>

<h2>Students per Class</h2>
<table border="1">
<tr>
    <th>Class</th>
    <th>Count</th>
</tr>

{% for row in class_data %}
<tr>
    <td>{{ row.class }}</td>
    <td>{{ row.count }}</td>
</tr>
{% endfor %}
</table>

<h2>Gender Distribution</h2>
<table border="1">
<tr>
    <th>Gender</th>
    <th>Count</th>
</tr>

{% for row in gender_data %}
<tr>
    <td>{{ row.gender }}</td>
    <td>{{ row.count }}</td>
</tr>
{% endfor %}
</table>

<br>
<a href="/">Back Home</a>

</body>
</html>
