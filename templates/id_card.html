<!DOCTYPE html>
<html>
<head>
  <title>ID Card</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:#f4f4f4; padding:30px; display:flex; justify-content:center; }
    .card {
      width:300px; background:white; border:2px solid #667eea; border-radius:12px; padding:15px;
      text-align:center; box-shadow:0 8px 20px rgba(0,0,0,0.15);
    }
    .logo { width:40px; margin-bottom:5px; }
    .photo { width:80px; height:100px; object-fit:cover; border:2px solid #667eea; margin-bottom:10px; }
    .barcode { width:130px; margin-top:10px; }
    .qr { width:60px; margin-top:5px; }
    .school-name { font-weight:bold; margin-bottom:5px; }
    .info { margin-bottom:3px; }
    .back-btn {
      display:block; margin:20px auto 0; padding:10px 20px; background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%);
      color:white; text-decoration:none; border-radius:8px; font-weight:bold; text-align:center;
    }
    .back-btn:hover { box-shadow:0 8px 20px rgba(245,87,108,0.4); transform:translateY(-2px);}
  </style>
</head>
<body>
  <div class="card">
    <img src="{{ url_for('static', filename='logo.png') }}" class="logo">
    <div class="school-name">LOLACHAT SEED S.S</div>
    <img src="{{ url_for('static', filename='student_photos/' + (student.photo or 'default.png')) }}" class="photo">
    <div class="info"><b>{{ student.first_name }} {{ student.last_name }}</b></div>
    <div class="info">Adm: {{ student.admission }}</div>
    <div class="info">{{ student.class }} {{ student.stream or '' }}</div>
    <img src="{{ url_for('static', filename='barcodes/' + student.admission + '.png') }}" class="barcode">
    <img src="{{ url_for('static', filename='qrcodes/' + student.admission + '.png') }}" class="qr">
    <a href="/students" class="back-btn">← Back to Students</a>
  </div>
</body>
</html>
