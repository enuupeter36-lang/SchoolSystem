<!DOCTYPE html>
<html>
<head>

<title>Student ID Card</title>

<style>

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  padding: 40px 20px;
  margin: 0;
}

.container {
  max-width: 500px;
  margin: 0 auto;
}

.card {
  width: 420px;
  height: 320px;
  border-radius: 16px;
  background: linear-gradient(135deg, #ffffff 0%, #f5f5f5 100%);
  border: 4px solid #667eea;
  padding: 16px;
  margin: 0 auto 30px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 8px;
  background: linear-gradient(90deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
}

.logo-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin-bottom: 8px;
}

.school-logo {
  width: 60px;
  height: 60px;
  object-fit: contain;
  margin-bottom: 6px;
}

.school-name {
  font-size: 13px;
  font-weight: bold;
  color: #667eea;
  text-align: center;
  line-height: 1.2;
}

.divider {
  height: 2px;
  background: linear-gradient(90deg, transparent, #667eea, transparent);
  margin: 8px 0;
}

.content {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
  flex: 1;
}

.student-photo {
  width: 80px;
  height: 100px;
  border-radius: 8px;
  border: 3px solid #667eea;
  object-fit: cover;
  flex-shrink: 0;
}

.details {
  flex: 1;
  font-size: 11px;
  color: #333;
  line-height: 1.5;
}

.details b {
  color: #333;
  font-size: 12px;
  display: block;
  margin-bottom: 4px;
}

.label {
  color: #667eea;
  font-weight: 600;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  display: block;
  margin-top: 3px;
  margin-bottom: 2px;
}

.qr {
  width: 70px;
  height: 70px;
  border-radius: 6px;
  border: 2px solid #667eea;
  object-fit: cover;
  flex-shrink: 0;
}

.barcode {
  width: 160px;
  height: 28px;
  margin-top: 5px;
  border-radius: 4px;
  object-fit: contain;
}

.footer {
  background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
  color: white;
  padding: 8px;
  border-radius: 6px;
  font-size: 10px;
  text-align: center;
  margin-top: 8px;
  line-height: 1.4;
}

.button-group {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 25px;
}

.btn {
  padding: 12px 25px;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.3s ease;
  text-decoration: none;
  display: inline-block;
  font-size: 1em;
}

.btn-print {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
}

.btn-print:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
}

.btn-back {
  background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
  color: white;
}

.btn-back:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(245, 87, 108, 0.4);
}

@media print {
  body {
    background: white;
    padding: 0;
  }
  .button-group {
    display: none;
  }
  .card {
    box-shadow: none;
    border: 2px solid #667eea;
    margin: 0;
  }
}

</style>

</head>

<body>

<div class="container">

  <div class="card">

    <div class="logo-section">
      <img src="{{ url_for('static', filename='logo.png') }}" class="school-logo" alt="School Logo">
      <div class="school-name">
        LOLACHAT SEED<br>
        SECONDARY SCHOOL
      </div>
    </div>

    <div class="divider"></div>

    <div class="content">

      <img src="{{ url_for('static', filename='student_photos/' + student[10]) }}" class="student-photo" alt="Student Photo">

      <div class="details">
        <b>{{ student[2] }} {{ student[3] }}</b>
        
        <span class="label">Admission</span>
        {{ student[1] }}

        <span class="label">Class</span>
        {{ student[6] }}

        <span class="label">Stream</span>
        {{ student[7] }}

        <img src="{{ url_for('static', filename='barcodes/' + student[1] + '.png') }}" class="barcode" alt="Barcode">
      </div>

      <img src="{{ url_for('static', filename='qrcodes/' + student[1] + '.png') }}" class="qr" alt="QR Code">

    </div>

    <div class="footer">
      📱 Scan QR to verify student identity
    </div>

  </div>

  <div class="button-group">
    <button onclick="window.print()" class="btn btn-print">🖨️ Print This Card</button>
    <a href="/students" class="btn btn-back">← Back to Students</a>
  </div>

</div>

</body>
</html>
