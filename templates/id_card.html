<!DOCTYPE html>
<html>
<head>
<title>ID Card</title>
<style>
body { font-family: Arial; display: flex; justify-content: center; padding: 50px; background: #f4f4f4; }
.card { border: 2px solid #667eea; padding: 15px; border-radius: 10px; width: 90mm; background: white; text-align: center; }
.logo { width: 40px; margin-bottom: 5px; }
.photo { width: 25mm; height: 30mm; object-fit: cover; border: 2px solid #667eea; margin-bottom: 5px; }
.qr { width: 20mm; margin-top: 5px; }
.barcode { width: 40mm; margin-top: 5px; }
.top { font-weight: bold; margin-bottom: 5px; }
</style>
</head>
<body>
<div class="card">
  <img src="{{ url_for('static', filename='logo.png') }}" class="logo">
  <div class="top">LOLACHAT SEED S.S</div>
  <img src="{{ url_for('static', filename='student_photos/' + (student.photo or 'default.png')) }}" class="photo">
  <div><b>{{ student.first_name }} {{ student.last_name }}</b></div>
  <div>Adm: {{ student.admission }}</div>
  <div>{{ student.class }} {{ student.stream or '' }}</div>
  <img src="{{ url_for('static', filename='barcodes/' + student.admission + '.png') }}" class="barcode">
  <img src="{{ url_for('static', filename='qrcodes/' + student.admission + '.png') }}" class="qr">
</div>
</body>
</html>
