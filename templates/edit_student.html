<!DOCTYPE html>
<html>
<head>
  <title>Edit Student</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 30px 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h2 { color: #667eea; text-align: center; margin-bottom: 30px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
    input, select { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1em; transition: all 0.3s ease; }
    input:focus, select:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.2); }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      font-size: 1em;
      cursor: pointer;
      background: linear-gradient(135deg, #ff9800 0%, #ffa726 100%);
      transition: all 0.3s ease;
      margin-top: 10px;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255,152,0,0.4); }

    .back-btn {
      display: inline-block;
      width: 100%;
      padding: 14px;
      text-align: center;
      border-radius: 8px;
      font-weight: bold;
      text-decoration: none;
      color: white;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      margin-top: 10px;
      transition: all 0.3s ease;
    }
    .back-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(245,87,108,0.4); }

    .current-photo {
      display: block;
      margin-bottom: 10px;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid #667eea;
      object-fit: cover;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>✏️ Edit Student</h2>

  <form method="POST" action="/edit/{{ student.id }}" enctype="multipart/form-data">
    <div class="form-group">
      <label>Admission Number *</label>
      <input type="text" name="admission" value="{{ student.admission }}" required autocomplete="off">
    </div>
    <div class="form-group">
      <label>First Name *</label>
      <input type="text" name="first_name" value="{{ student.first_name }}" required autocomplete="off">
    </div>
    <div class="form-group">
      <label>Last Name *</label>
      <input type="text" name="last_name" value="{{ student.last_name }}" required autocomplete="off">
    </div>
    <div class="form-group">
      <label>Gender</label>
      <select name="gender">
        <option value="">Select...</option>
        <option {% if student.gender == 'Male' %}selected{% endif %}>Male</option>
        <option {% if student.gender == 'Female' %}selected{% endif %}>Female</option>
      </select>
    </div>
    <div class="form-group">
      <label>Date of Birth</label>
      <input type="date" name="dob" value="{{ student.dob }}">
    </div>
    <div class="form-group">
      <label>Class *</label>
      <select name="class" required>
        <option value="">Select...</option>
        <option {% if student.class == 'S1' %}selected{% endif %}>S1</option>
        <option {% if student.class == 'S2' %}selected{% endif %}>S2</option>
        <option {% if student.class == 'S3' %}selected{% endif %}>S3</option>
        <option {% if student.class == 'S4' %}selected{% endif %}>S4</option>
        <option {% if student.class == 'S5' %}selected{% endif %}>S5</option>
        <option {% if student.class == 'S6' %}selected{% endif %}>S6</option>
      </select>
    </div>
    <div class="form-group">
      <label>Stream</label>
      <input type="text" name="stream" value="{{ student.stream }}" autocomplete="off">
    </div>
    <div class="form-group">
      <label>Parent/Guardian Name</label>
      <input type="text" name="parent" value="{{ student.parent }}" autocomplete="off">
    </div>
    <div class="form-group">
      <label>Phone Number *</label>
      <input type="text" name="phone" value="{{ student.phone }}" required autocomplete="off">
    </div>
    <div class="form-group">
      <label>Student Photo</label>
      {% if student.photo %}
        <img src="{{ url_for('static', filename='student_photos/' + student.photo) }}" class="current-photo">
      {% endif %}
      <input type="file" name="photo" accept="image/*">
    </div>

    <button type="submit" class="btn">✅ Update Student</button>
    <a href="/students" class="back-btn">← Back to Students</a>
  </form>
</div>

</body>
</html>
