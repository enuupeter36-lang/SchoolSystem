<!DOCTYPE html>
<html>
<head>
<title>Edit Student</title>
</head>
<body>

<h2>Edit Student</h2>

<form method="POST">

  <input name="first_name" value="{{ student.first_name }}" required><br><br>
  <input name="last_name" value="{{ student.last_name }}" required><br><br>
  <input name="gender" value="{{ student.gender }}"><br><br>
  <input name="dob" value="{{ student.dob }}"><br><br>
  <input name="class" value="{{ student.class }}" required><br><br>
  <input name="stream" value="{{ student.stream }}"><br><br>
  <input name="parent" value="{{ student.parent }}"><br><br>
  <input name="phone" value="{{ student.phone }}" required><br><br>

  <button type="submit">Update</button>

</form>

<a href="/students">Back</a>

</body>
</html>
