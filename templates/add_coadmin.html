<!DOCTYPE html>
<html>
<head>
  <title>Add Co-Admin</title>
  <style>
    body {
      font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
      display:flex; justify-content:center; align-items:center;
      min-height:100vh; padding:20px;
    }
    .container {
      background:white; padding:40px; border-radius:12px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2); width:350px;
    }
    h2 {
      color:#667eea; margin-bottom:30px; text-align:center;
    }
    input {
      padding:12px; width:100%; margin-bottom:15px;
      border:2px solid #e0e0e0; border-radius:8px; font-size:1em;
    }
    input:focus {
      outline:none; border-color:#667eea;
      box-shadow:0 0 0 3px rgba(102,126,234,0.1);
    }
    button {
      width:100%; padding:14px;
      background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
      color:white; border:none; border-radius:8px;
      font-weight:bold; cursor:pointer; font-size:1em;
      transition: all 0.3s ease;
    }
    button:hover {
      transform:translateY(-2px);
      box-shadow:0 8px 20px rgba(102,126,234,0.4);
    }
    .back-btn {
      display:block; margin-top:15px; text-align:center;
      text-decoration:none; font-weight:bold;
      color:white; background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%);
      padding:12px; border-radius:8px; transition: all 0.3s ease;
    }
    .back-btn:hover {
      transform:translateY(-2px);
      box-shadow:0 8px 20px rgba(245,87,108,0.4);
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>➕ Add Co-Admin</h2>
    <form method="POST">
      <input type="text" name="username" placeholder="Co-Admin Username" required>
      <input type="password" name="password" placeholder="Password" required>
      <input type="password" name="confirm_password" placeholder="Confirm Password" required>
      <button type="submit">Add Co-Admin</button>
    </form>
    <a href="/" class="back-btn">← Back to Dashboard</a>
  </div>
</body>
</html>
