<!DOCTYPE html>
<html>
<head>
  <title>Batch Print ID Cards</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f4f4f4;
      padding: 20px;
    }

    h2 {
      text-align: center;
      color: #667eea;
      margin-bottom: 20px;
    }

    .controls {
      text-align: center;
      margin-bottom: 20px;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      color: white;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 5px;
      text-decoration: none;
      display: inline-block;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102,126,234,0.4);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .card {
      border: 2px solid #667eea;
      border-radius: 12px;
      background: white;
      padding: 10px;
      text-align: center;
      page-break-inside: avoid;
    }

    .logo {
      width: 40px;
      margin-bottom: 5px;
    }

    .photo {
      width: 80px;
      height: 100px;
      object-fit: cover;
      border: 2px solid #667eea;
      margin-bottom: 5px;
      border-radius: 6px;
    }

    .barcode, .qr {
      width: 80px;
      margin-top: 5px;
    }

    .top {
      font-weight: bold;
      margin-bottom: 5px;
      color: #764ba2;
    }

    @media print {
      .btn {
        display: none;
      }
    }
  </style>
</head>
<body>

<h2>Batch Print ID Cards</h2>

<div class="controls">
  <button onclick="window.print()" class="btn">🖨 Print All</button>
  <a href="/students" class="btn">← Back to Students</a>
</div>

<div class="grid">
  {% for s in students %}
  <div class="card">
    <img src="{{ url_for('static', filename='logo.png') }}" class="logo">
    <div class="top">LOLACHAT SEED S.S</div>

    <img src="{{ url_for('static', filename='student_photos/' + (s.photo or 'default.png')) }}" class="photo">

    <div><b>{{ s.first_name }} {{ s.last_name }}</b></div>
    <div>Adm: {{ s.admission }}</div>
    <div>{{ s.class }} {{ s.stream or '' }}</div>

    <img src="{{ url_for('static', filename='barcodes/' + s.admission + '.png') }}" class="barcode">
    <img src="{{ url_for('static', filename='qrcodes/' + s.admission + '.png') }}" class="qr">
  </div>
  {% endfor %}
</div>

</body>
</html>
