<!DOCTYPE html>
<html>
<head>
  <title>Batch Print ID Cards</title>
  <style>
    body {
      font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
      padding:30px 20px; min-height:100vh;
    }
    h2 {
      text-align:center; color:white;
      margin-bottom:30px;
      text-shadow:2px 2px 4px rgba(0,0,0,0.2);
    }
    .controls {
      text-align:center; margin-bottom:25px;
    }
    .btn {
      padding:12px 25px; margin:5px;
      border:none; border-radius:8px;
      font-weight:bold; cursor:pointer; color:white;
      transition: all 0.3s ease;
      text-decoration:none; display:inline-block;
    }
    .btn-print {
      background:linear-gradient(135deg,#4facfe 0%,#00f2fe 100%);
    }
    .btn-print:hover {
      transform:translateY(-2px);
      box-shadow:0 8px 20px rgba(79,172,254,0.4);
    }
    .btn-back {
      background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%);
    }
    .btn-back:hover {
      transform:translateY(-2px);
      box-shadow:0 8px 20px rgba(245,87,108,0.4);
    }
    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
      gap:20px;
    }
    .card {
      background:white; border:2px solid #667eea;
      border-radius:12px; padding:15px; text-align:center;
      page-break-inside:avoid;
    }
    .card img.logo {
      width:50px; margin-bottom:5px;
    }
    .card .school-name {
      font-weight:bold; margin-bottom:8px;
      color:#667eea;
    }
    .card img.photo {
      width:100px; height:120px; object-fit:cover;
      border:2px solid #667eea; border-radius:8px;
      margin-bottom:10px;
    }
    .card .student-name {
      font-weight:bold; font-size:1.1em; margin-bottom:5px;
    }
    .card .details {
      margin-bottom:8px; font-size:0.95em;
    }
    .card img.barcode, .card img.qr {
      margin-top:5px; width:80px; height:auto;
    }
    @media print {
      .btn { display:none; }
    }
  </style>
</head>
<body>

<h2>🖨 Batch Print ID Cards</h2>

<div class="controls">
  <button class="btn btn-print" onclick="window.print()">Print All ID Cards</button>
  <a href="/students" class="btn btn-back">← Back to Students</a>
</div>

<div class="grid">
  {% for s in students %}
  <div class="card">
    <!-- School Logo -->
    <img src="{{ url_for('static', filename='logo.png') }}" class="logo">
    <div class="school-name">LOLACHAT SEED S.S</div>

    <!-- Student Photo -->
    <img src="{{ url_for('static', filename='student_photos/' + (s.photo or 'default.png')) }}" class="photo">

    <!-- Name & Details -->
    <div class="student-name">{{ s.first_name }} {{ s.last_name }}</div>
    <div class="details">Adm: {{ s.admission }}</div>
    <div class="details">{{ s.class }} {{ s.stream or '' }}</div>

    <!-- Barcode & QR Code -->
    <img src="{{ url_for('static', filename='barcodes/' + s.admission + '.png') }}" class="barcode">
    <img src="{{ url_for('static', filename='qrcodes/' + s.admission + '.png') }}" class="qr">
  </div>
  {% endfor %}
</div>

</body>
</html>
