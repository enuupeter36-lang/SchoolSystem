<!DOCTYPE html>
<html>
<head>

<title>Batch Print ID Cards</title>

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  padding: 40px 20px;
}

.container {
  max-width: 800px;
  margin: 0 auto;
  background: white;
  padding: 40px;
  border-radius: 12px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}

h1 {
  color: #667eea;
  margin-bottom: 10px;
  text-align: center;
}

.subtitle {
  color: #999;
  text-align: center;
  margin-bottom: 30px;
}

.class-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-bottom: 30px;
}

.class-card {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  padding: 30px;
  border-radius: 12px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s ease;
  text-decoration: none;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  min-height: 150px;
}

.class-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 15px 35px rgba(102, 126, 234, 0.4);
}

.class-name {
  font-size: 2em;
  font-weight: bold;
  margin-bottom: 10px;
}

.class-label {
  font-size: 0.9em;
  opacity: 0.9;
}

.button-group {
  display: flex;
  gap: 15px;
  justify-content: center;
  margin-top: 30px;
}

.btn {
  padding: 14px 30px;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
  text-decoration: none;
  text-align: center;
  transition: all 0.3s ease;
  font-size: 1em;
}

.btn-print-all {
  background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
  color: white;
}

.btn-print-all:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(79, 172, 254, 0.4);
}

.btn-back {
  background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
  color: white;
}

.btn-back:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(245, 87, 108, 0.4);
}

</style>

</head>

<body>

<div class="container">

  <h1>🖨️ Print ID Cards</h1>
  <p class="subtitle">Select a class to print all ID cards for that class</p>

  <div class="class-grid">
    {% for cls in classes %}
    <a href="/print-all?class={{ cls[0] }}" class="class-card">
      <div class="class-name">{{ cls[0] }}</div>
      <div class="class-label">Print ID Cards</div>
    </a>
    {% endfor %}
  </div>

  <div class="button-group">
    <a href="/print-all" class="btn btn-print-all">🖨️ Print All Students</a>
    <a href="/" class="btn btn-back">← Back to Dashboard</a>
  </div>

</div>

</body>
</html>
